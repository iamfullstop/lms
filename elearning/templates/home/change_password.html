{% extends 'layout.html' %}

{% block title %}
<title>Change Password</title>
{% endblock %}


{% block content %}

<div class="max-w-md mx-auto mt-12 bg-white p-6 shadow-md rounded-md">

    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-800">Change Password</h2>
      <p class="text-sm text-gray-500">Ensure your account is using a long, random password</p>
    </div>

    <form method="POST" action="" class="space-y-5"> 
      {% csrf_token %}
      <!-- Current Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2" for="current_password">Current Password</label>
        <div class="relative">
          <input type="password" id="current_password" name="current_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <!-- New Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mt-2" for="new_password">New Password</label>
        <div class="relative">
          <input type="password" id="new_password" name="new_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mt-2" for="confirm_password">Confirm New Password</label>
        <div class="relative">
          <input type="password" id="confirm_password" name="confirm_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <!-- Submit Button -->
      <div> 
        <button type="submit"
                class="w-full mt-4  bg-blue-600 text-white py-2  rounded-lg hover:bg-blue-700 transition duration-200 font-semibold">
          Update Password
        </button>
      </div>

      <!-- Feedback message -->
      {% if messages %}
        <div class="mt-4 text-sm text-center text-red-500">
          {% for message in messages %}
            {{ message }}
          {% endfor %}
        </div>
      {% endif %}
    </form>

    <!-- Password visibility toggle script -->
    <script>
      const inputs = ['current_password', 'new_password', 'confirm_password'];
      inputs.forEach(id => {
        const input = document.getElementById(id);
        const toggle = document.createElement('span');
        toggle.innerHTML = '👁️';
        toggle.classList = 'absolute right-3 top-2 p-1 cursor-pointer text-gray-500';
        toggle.addEventListener('click', () => {
          input.type = input.type === 'password' ? 'text' : 'password';
        });
        input.parentNode.appendChild(toggle);
      });
    </script>
  </div>
</div>
{% endblock %}
